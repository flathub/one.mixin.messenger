id: one.mixin.messenger
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: mixin_desktop
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --share=network
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher

modules:
  - name: mixin_desktop
    buildsystem: simple
    build-commands:
      - install -Dm755 mixin_desktop /app/mixin_desktop/mixin_desktop
      - cp -r data /app/mixin_desktop/data
      - cp -r lib /app/mixin_desktop/lib
      - mkdir -p /app/bin
      - ln -s /app/mixin_desktop/mixin_desktop /app/bin/mixin_desktop
      - install -Dm644 mixin_desktop.png /app/share/icons/hicolor/256x256/apps/one.mixin.messenger.png
      - install -Dm644 one.mixin.messenger.desktop -t /app/share/applications/
      - install -Dm644 one.mixin.messenger.metainfo.xml -t /app/share/appdata/
    sources:
      - type: file
        path: one.mixin.messenger.desktop
      - type: file
        path: mixin_desktop.png
      - type: archive
        archive-type: tar
        url: https://github.com/MixinNetwork/flutter-app/releases/download/v4.2.0/mixin_desktop_linux_amd64_portable.tar.gz
        sha256: b9f2defce87272bc5a0cc180bbe937cecf5e34a6f414b32413732650f290a9fc
        x-checker-data:
          type: json
          url: https://api.github.com/repos/MixinNetwork/flutter-app/releases/latest
          version-query: .tag_name | sub("^v"; "")
          url-query: .assets[] | select(.name == "mixin_desktop_linux_amd64_portable.tar.gz")
            | .browser_download_url
          release-url-template: https://github.com/MixinNetwork/flutter-app/releases/tag/v$version
          is-main-source: true
        only-arches:
          - x86_64
      - type: archive
        archive-type: tar
        url: https://github.com/MixinNetwork/flutter-app/releases/download/v4.2.0/mixin_desktop_linux_arm64_portable.tar.gz
        sha256: c275eb0ab0ae3192eac7b1d7caedb9c332e129ebf43c092bf9c68339cdc7a3fd
        x-checker-data:
          type: json
          url: https://api.github.com/repos/MixinNetwork/flutter-app/releases/latest
          version-query: .tag_name | sub("^v"; "")
          url-query: .assets[] | select(.name == "mixin_desktop_linux_arm64_portable.tar.gz")
            | .browser_download_url
        only-arches:
          - aarch64
      - type: file
        path: one.mixin.messenger.metainfo.xml
